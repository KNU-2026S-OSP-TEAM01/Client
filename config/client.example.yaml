# OpenPark Client 설정 파일 예시
# 이 파일을 client.yaml로 복사한 후 실제 값을 채워서 사용하세요.
# (client.yaml은 .gitignore에 등록되어 있어 깃에 올라가지 않음)

# Parking Lot Server 정보
server:
  # 서버 주소 (Private 모드면 사설 IP, Public 모드면 공용 도메인)
  url: "http://localhost:8000"

  # 주차장별 API 키 (서버 관리자에게 발급받음)
  api_key: "YOUR_API_KEY_HERE"

# 카메라 설정
camera:
  # 카메라 장치 번호 (0이 기본 웹캠)
  device_index: 0

# YOLO 모델 설정
model:
  # 모델 파일 경로
  path: "models/plate_yolo.pt"

  # 검출 신뢰도 임계값 (이 값 이하는 무시)
  confidence_threshold: 0.5

# 중복 인식 방지 설정
deduplicator:
  # 같은 번호판 재인식 대기 시간(초)
  cooldown_seconds: 30