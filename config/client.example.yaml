# ============================================
# OpenPark Client 설정 파일 (예시)
# ============================================
# 사용법:
#   1. 이 파일을 client.yaml로 복사
#   2. 환경에 맞게 값 수정
#   3. main.py 실행 시 이 설정을 자동으로 읽음
#
# 주의: client.yaml은 api_key를 포함하므로 git에 커밋되지 않음
#       (.gitignore에 등록됨)
# ============================================

# Parking Lot Server 통신 설정
server:
  url: "https://parking-server.example.com"   # 주차장 서버 주소
  api_key: "your-api-key-here"                # 주차장별로 발급된 API 키
  timeout_seconds: 5                          # 요청 타임아웃 (초)

# 카메라 설정
camera:
  device_id: 0   # PC 웹캠은 보통 0, 라즈베리파이 외장 카메라는 1 또는 2

# YOLO 모델 설정
model:
  path: "models/best.pt"   # 학습된 모델 가중치 파일 경로
  conf_threshold: 0.5      # 검출 신뢰도 임계값 (0~1)

# OCR 설정
ocr:
  use_gpu: true            # GPU 사용 여부 (라즈베리파이는 false)
  min_confidence: 0.5      # OCR 최소 신뢰도

# 중복 인식 방지
deduplicator:
  cooldown_seconds: 30     # 같은 번호판 재인식 차단 시간 (초)

  
# OCR 결과 안정화 (다수결 + 유사도 그룹화 + 송신 후 suppress)
buffer:
  window_size: 10            # 최근 N프레임 누적
  min_count: 5               # 같은 그룹이 N번 이상 나와야 인정
  min_avg_conf: 0.7          # 평균 OCR 신뢰도 임계값
  similarity_threshold: 1    # 편집거리 ≤ N 인 plate는 같은 차로 봄 (0=엄격)